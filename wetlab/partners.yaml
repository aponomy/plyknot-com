# Wet-lab partner registry.
# Each partner is a registry-phone-book entity with declared instrument
# coverage, turnaround time, per-assay cost, and a depends chain
# documenting the platform.
#
# Architectural rule: any property-value claim promoted from predict()
# to measure() must clear at least two independent instrument clusters.
# Two different CROs with different platforms, or one CRO plus one
# academic partner, or one wet lab plus one cloud lab.

