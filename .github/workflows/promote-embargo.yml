name: Promote embargoed entries

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plyknot-com
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run embargo promotion
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: python scripts/promote-embargo.py

      # The script opens atomic PR pairs:
      # - One against plyknot-com removing the entry from universe-private/
      # - One against plyknot/universe adding the entry (minus embargo block)
      # Both PRs reference each other. Neither merges alone.
      # The Archivist confirms both are green, then merges both.
