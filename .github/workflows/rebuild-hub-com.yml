name: Rebuild commercial Hub D1 cache

on:
  push:
    branches: [main]
    paths:
      - "universe-private/**"
      - "research-private/**/deltas/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plyknot-com
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild commercial D1 cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/rebuild-hub-com.py
